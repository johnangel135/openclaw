<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpenClaw Login</title>
  <style>
    body{font-family:Inter,system-ui,sans-serif;max-width:420px;margin:40px auto;padding:16px}
    h1{margin-bottom:8px} .muted{color:#556; margin-bottom:16px}
    .box{border:1px solid #dde3f4;border-radius:12px;padding:14px;margin-bottom:12px}
    input{width:100%;padding:10px;border:1px solid #c9d3f1;border-radius:8px;margin:6px 0 10px}
    button{padding:10px 14px;border-radius:8px;border:1px solid #264db6;background:#2b61f0;color:#fff;cursor:pointer}
    #msg{margin-top:10px;color:#0a6} #err{margin-top:10px;color:#b00}
  </style>
</head>
<body>
  <h1>OpenClaw Account</h1>
  <div class="muted">Sign up or login to access Console.</div>

  <div class="box">
    <h3>Sign up</h3>
    <input id="suEmail" placeholder="email"/>
    <input id="suPass" type="password" placeholder="password (8+ chars)"/>
    <button onclick="signup()">Create account</button>
  </div>

  <div class="box">
    <h3>Login</h3>
    <input id="liEmail" placeholder="email"/>
    <input id="liPass" type="password" placeholder="password"/>
    <button onclick="login()">Login</button>
  </div>

  <div id="msg"></div>
  <div id="err"></div>

  <script>
    function setMessage(msg){document.getElementById('msg').textContent=msg;document.getElementById('err').textContent='';}
    function setError(msg){document.getElementById('err').textContent=msg;document.getElementById('msg').textContent='';}

    async function signup(){
      const email=document.getElementById('suEmail').value;
      const password=document.getElementById('suPass').value;
      const res=await fetch('/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const data=await res.json().catch(()=>({}));
      if(!res.ok){setError(data?.error?.message||'Signup failed');return;}
      setMessage('Account created. You are logged in. Redirecting...');
      setTimeout(()=>location.href='/console',500);
    }

    async function login(){
      const email=document.getElementById('liEmail').value;
      const password=document.getElementById('liPass').value;
      const res=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const data=await res.json().catch(()=>({}));
      if(!res.ok){setError(data?.error?.message||'Login failed');return;}
      setMessage('Login success. Redirecting...');
      setTimeout(()=>location.href='/console',300);
    }
  </script>
</body>
</html>
