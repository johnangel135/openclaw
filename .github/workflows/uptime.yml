name: Uptime Monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  healthcheck:
    name: Check frontend + control + data plane
    runs-on: ubuntu-latest
    steps:
      - name: Check frontend root
        run: |
          curl --fail --silent --show-error --location --retry 3 --retry-all-errors --max-time 45 "https://johntruong.it.com/"

      - name: Check control plane health
        run: |
          curl --fail --silent --show-error --location --retry 3 --retry-all-errors --max-time 45 "https://openclaw-control-plane.onrender.com/health"

      - name: Check data plane health
        run: |
          curl --fail --silent --show-error --location --retry 4 --retry-all-errors --max-time 60 "https://openclaw-data-plane.onrender.com/health"
