name: Auto Release

on:
  push:
    branches: ["**"]

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Build release tag
        run: |
          BRANCH_SAFE="${GITHUB_REF_NAME//\//-}"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "RELEASE_TAG=auto-${BRANCH_SAFE}-${GITHUB_RUN_NUMBER}-${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Auto Release ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
