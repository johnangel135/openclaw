name: CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/johnangel135/openclaw:latest
            ghcr.io/johnangel135/openclaw:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up SSH key for QNAP deploy
        run: |
          if [ -z "${{ secrets.QNAP_HOST }}" ] || [ -z "${{ secrets.QNAP_USER }}" ] || [ -z "${{ secrets.QNAP_SSH_PRIVATE_KEY }}" ]; then
            echo "Missing required secrets: QNAP_HOST, QNAP_USER, QNAP_SSH_PRIVATE_KEY"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.QNAP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.QNAP_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy latest image on QNAP
        env:
          QNAP_HOST: ${{ secrets.QNAP_HOST }}
          QNAP_USER: ${{ secrets.QNAP_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes "${QNAP_USER}@${QNAP_HOST}" '
            set -e
            docker pull ghcr.io/johnangel135/openclaw:latest
            docker rm -f openclaw || true
            docker run -d --name openclaw --restart unless-stopped -p 3000:3000 ghcr.io/johnangel135/openclaw:latest
          '
