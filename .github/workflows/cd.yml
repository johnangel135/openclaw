name: CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/johnangel135/openclaw:latest
            ghcr.io/johnangel135/openclaw:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-on-qnap:
    name: Deploy on QNAP Runner
    needs: build-and-push
    runs-on: [self-hosted, qnap]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and restart app container
        run: |
          set -euo pipefail
          docker pull ghcr.io/johnangel135/openclaw:latest
          docker rm -f openclaw || true
          docker run -d --name openclaw --restart unless-stopped -p 3000:3000 ghcr.io/johnangel135/openclaw:latest
