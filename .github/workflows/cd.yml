name: CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/johnangel135/openclaw:latest
            ghcr.io/johnangel135/openclaw:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render redeploy (frontend/control/data)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_FRONTEND_SERVICE_ID: srv-d720r7paae7s73frcoj0
          RENDER_CONTROL_SERVICE_ID: srv-d720r4aa214c73dkj35g
          RENDER_DATA_SERVICE_ID: srv-d720r18ule4c7385io30
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "Missing required secret: RENDER_API_KEY"
            exit 1
          fi

          for SID in "$RENDER_FRONTEND_SERVICE_ID" "$RENDER_CONTROL_SERVICE_ID" "$RENDER_DATA_SERVICE_ID"; do
            echo "Trigger deploy for $SID"
            curl --fail --silent --show-error \
              --request POST \
              --url "https://api.render.com/v1/services/$SID/deploys" \
              --header "Accept: application/json" \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              --header "Content-Type: application/json" \
              --data '{"clearCache":"do_not_clear"}'
          done
