name: CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/johnangel135/openclaw:latest
            ghcr.io/johnangel135/openclaw:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render redeploy (all planes)
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
          RENDER_DEPLOY_HOOK_CONTROL: ${{ secrets.RENDER_DEPLOY_HOOK_CONTROL }}
          RENDER_DEPLOY_HOOK_DATA: ${{ secrets.RENDER_DEPLOY_HOOK_DATA }}
        run: |
          for name in RENDER_DEPLOY_HOOK_FRONTEND RENDER_DEPLOY_HOOK_CONTROL RENDER_DEPLOY_HOOK_DATA; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              exit 1
            fi
          done

          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_FRONTEND"
          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_CONTROL"
          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_DATA"
