<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting to Sign in…</title>
  <script>
    const target = new URL('https://openclaw-control-plane.onrender.com/auth');
    if (location.search) target.search = location.search.slice(1);
    location.replace(target.toString());
  </script>
</head>
<body>Redirecting to <a id="authLink" href="https://openclaw-control-plane.onrender.com/auth">Sign in</a>…
<script>
  const link = document.getElementById('authLink');
  const target = new URL(link.href);
  if (location.search) target.search = location.search.slice(1);
  link.href = target.toString();
</script>
</body>
</html>
